<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown Timer</title>
  <style>
    :root {
      --panel: #ffffff;
      --text: #111111;
      --border: #e5e7eb;
      --accent: #111111;
      --focus: rgba(17, 17, 17, 0.05);
      --ui-scale: 1;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 36px;
      padding-bottom: 12px;
    }

    .card {
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      gap: calc(10px * var(--ui-scale));
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: calc(14px * var(--ui-scale));
      padding: calc(10px * var(--ui-scale));
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.02);
      width: fit-content;
    }

    .timer {
      width: auto;
      min-width: 5.8ch;
      border: 1px solid transparent;
      border-radius: calc(8px * var(--ui-scale));
      padding: calc(2px * var(--ui-scale)) calc(6px * var(--ui-scale));
      text-align: center;
      font: inherit;
      font-size: calc(28px * var(--ui-scale));
      font-weight: 700;
      line-height: 1.2;
      color: var(--text);
      background: transparent;
      outline: none;
      caret-color: var(--accent);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.03em;
      min-height: calc(28px * var(--ui-scale));
      white-space: nowrap;
    }

    .timer:focus {
      background: var(--focus);
      border-color: var(--border);
    }

    button {
      border: none;
      border-radius: calc(8px * var(--ui-scale));
      width: calc(44px * var(--ui-scale));
      height: calc(44px * var(--ui-scale));
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      flex: 0 0 auto;
    }

    button:active { transform: translateY(1px); }

    button:focus-visible,
    .timer:focus-visible {
      outline: 2px solid rgba(17, 17, 17, 0.18);
      outline-offset: 2px;
    }

    svg {
      width: calc(18px * var(--ui-scale));
      height: calc(18px * var(--ui-scale));
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <input id="timer" class="timer" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" aria-label="Countdown timer" value="10:00" />
    <button id="startBtn" aria-label="Start" type="button">
      <svg id="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M8 5.5L19 12L8 18.5V5.5Z" />
      </svg>
    </button>
  </div>

  <script>
    const timerEl = document.getElementById('timer');
    const btn = document.getElementById('startBtn');
    const icon = document.getElementById('icon');

    let total = 600;
    let remaining = total;
    let running = false;
    let interval = null;
    let isEditing = false;
    let editDirty = false;
    let editSnapshot = '10:00';
    let displayMode = 'm';

    const params = new URLSearchParams(window.location.search);

    function getNum(keys) {
      for (const k of keys) {
        if (params.has(k)) {
          const raw = params.get(k);
          const v = raw === null || raw === '' ? 1 : Number(raw);
          if (Number.isFinite(v) && v >= 0) return v;
          return 1;
        }
      }
      return 0;
    }

    const dVal = getNum(['days', 'day', 'd']);
    const hVal = getNum(['hours', 'hour', 'h']);
    const mVal = getNum(['minutes', 'mins', 'min', 'm']);
    const sVal = getNum(['seconds', 'secs', 'sec', 's']);

    function isDigits(text) {
      if (text.length === 0) return false;
      for (const ch of text) {
        if (ch < '0' || ch > '9') return false;
      }
      return true;
    }

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function updateWidth(text) {
      const len = Math.max(5.8, String(text).length + 0.5);
      timerEl.style.width = `${len}ch`;
    }

    function updateScale() {
      const w = window.innerWidth || 320;
      const h = window.innerHeight || 120;
      const scale = Math.max(0.72, Math.min(w / 420, h / 120, 1.45));
      document.documentElement.style.setProperty('--ui-scale', String(scale));
    }

    function format(sec, mode = displayMode) {
      const safe = Math.max(0, Math.floor(sec));
      const days = Math.floor(safe / 86400);
      const hours = Math.floor((safe % 86400) / 3600);
      const minutes = Math.floor((safe % 3600) / 60);
      const seconds = safe % 60;

      if (mode === 'd') return `${pad(days)}:${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
      if (mode === 'h') return `${pad(Math.floor(safe / 3600))}:${pad(minutes)}:${pad(seconds)}`;
      return `${pad(Math.floor(safe / 60))}:${pad(seconds)}`;
    }

    function parse(text) {
      const raw = String(text).trim();
      if (!raw) return 0;

      if (raw.indexOf(':') !== -1) {
        const parts = raw.split(':');
        if (parts.length < 2 || parts.length > 4) return 0;
        const nums = parts.map((part) => part.trim());

        if (parts.length === 2) {
          const minutesRaw = nums[0];
          const secondsRaw = nums[1];
          if (secondsRaw === '' || !isDigits(secondsRaw)) return 0;
          if (minutesRaw !== '' && !isDigits(minutesRaw)) return 0;
          const minutes = minutesRaw === '' ? 0 : Number(minutesRaw);
          const seconds = Number(secondsRaw);
          if (seconds > 59) return 0;
          displayMode = 'm';
          return (minutes * 60) + seconds;
        }

        if (parts.length === 3) {
          const [hoursRaw, minutesRaw, secondsRaw] = nums;
          if (![hoursRaw, minutesRaw, secondsRaw].every(isDigits)) return 0;
          const hours = Number(hoursRaw);
          const minutes = Number(minutesRaw);
          const seconds = Number(secondsRaw);
          if (minutes > 59 || seconds > 59) return 0;
          displayMode = 'h';
          return (hours * 3600) + (minutes * 60) + seconds;
        }

        const [daysRaw, hoursRaw, minutesRaw, secondsRaw] = nums;
        if (![daysRaw, hoursRaw, minutesRaw, secondsRaw].every(isDigits)) return 0;
        const days = Number(daysRaw);
        const hours = Number(hoursRaw);
        const minutes = Number(minutesRaw);
        const seconds = Number(secondsRaw);
        if (hours > 23 || minutes > 59 || seconds > 59) return 0;
        displayMode = 'd';
        return (days * 86400) + (hours * 3600) + (minutes * 60) + seconds;
      }

      if (!isDigits(raw)) return 0;
      displayMode = 'm';
      return Number(raw) * 60;
    }

    function updateIcon() {
      const shouldShowPlay = (!running) || editDirty;
      btn.setAttribute('aria-label', shouldShowPlay ? 'Start' : 'Pause');
      icon.innerHTML = shouldShowPlay
        ? '<path d="M8 5.5L19 12L8 18.5V5.5Z" />'
        : '<path d="M6 5h4v14H6zM14 5h4v14h-4z" />';
    }

    function render() {
      const shouldLiveUpdate = !isEditing || !editDirty;
      if (!shouldLiveUpdate) return;

      const focused = document.activeElement === timerEl;
      const start = focused ? timerEl.selectionStart : null;
      const end = focused ? timerEl.selectionEnd : null;
      const direction = focused ? timerEl.selectionDirection : 'none';

      const text = format(remaining);
      timerEl.value = text;
      updateWidth(text);

      if (focused && start !== null && end !== null && start !== end) {
        requestAnimationFrame(() => {
          try {
            timerEl.setSelectionRange(start, end, direction);
          } catch (_) {
            // Ignore selection restore errors.
          }
        });
      }
    }

    function stop() {
      running = false;
      if (interval) {
        clearInterval(interval);
        interval = null;
      }
      updateIcon();
    }

    function start() {
      if (running) {
        stop();
        return;
      }
      if (remaining <= 0) remaining = total;
      running = true;
      updateIcon();
      interval = setInterval(tick, 1000);
    }

    function tick() {
      if (remaining <= 0) {
        stop();
        render();
        return;
      }
      remaining -= 1;
      render();
      if (remaining <= 0) {
        stop();
        render();
      }
    }

    function commitAndOptionallyStart(shouldStart) {
      const parsed = parse(timerEl.value);
      if (parsed > 0) {
        total = parsed;
        remaining = parsed;
      }
      isEditing = false;
      editDirty = false;
      render();
      updateIcon();
      if (shouldStart && parsed > 0 && !running) start();
    }

    function cancelEdit() {
      isEditing = false;
      editDirty = false;
      timerEl.value = editSnapshot;
      updateWidth(editSnapshot);
      render();
      updateIcon();
    }

    function selectAll() {
      requestAnimationFrame(() => {
        timerEl.setSelectionRange(0, timerEl.value.length);
      });
    }

    timerEl.addEventListener('focus', () => {
      isEditing = true;
      editDirty = false;
      editSnapshot = format(remaining);
      timerEl.value = editSnapshot;
      updateWidth(editSnapshot);
      updateIcon();
      selectAll();
    });

    timerEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        commitAndOptionallyStart(true);
        timerEl.blur();
        return;
      }

      if (e.key === 'Escape') {
        e.preventDefault();
        cancelEdit();
        timerEl.blur();
        return;
      }

      if (e.key.length === 1 && !/[0-9:]/.test(e.key)) {
        e.preventDefault();
      }
    });

    timerEl.addEventListener('blur', () => {
      if (!editDirty) {
        isEditing = false;
        updateIcon();
      } else {
        cancelEdit();
      }
    });

    timerEl.addEventListener('input', () => {
      editDirty = timerEl.value !== editSnapshot;
      updateWidth(timerEl.value || editSnapshot);
      updateIcon();
    });

    timerEl.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text');
      const cleaned = text.replace(/[^0-9:]/g, '');
      document.execCommand('insertText', false, cleaned);
      editDirty = timerEl.value !== editSnapshot;
      updateWidth(timerEl.value);
      updateIcon();
    });

    btn.addEventListener('mousedown', () => {
      if (isEditing && editDirty) {
        // keep edit state; click will commit
      }
    });

    btn.addEventListener('click', () => {
      if (isEditing && editDirty) {
        commitAndOptionallyStart(true);
        return;
      }
      start();
    });

    window.addEventListener('resize', updateScale);
    updateScale();

    const initialSeconds = (dVal * 86400) + (hVal * 3600) + (mVal * 60) + sVal;
    if (initialSeconds > 0) {
      total = initialSeconds;
      remaining = initialSeconds;
      if (dVal > 0) displayMode = 'd';
      else if (hVal > 0) displayMode = 'h';
      else displayMode = 'm';
    }

    const initialText = format(remaining);
    timerEl.value = initialText;
    updateWidth(initialText);
    updateIcon();
  </script>
</body>
</html>
